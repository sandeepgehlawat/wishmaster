[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci --ignore-scripts"]

[phases.build]
cmds = ["npm run build", "cp -r public .next/standalone/ 2>/dev/null || true", "cp -r .next/static .next/standalone/.next/ 2>/dev/null || true"]

[start]
cmd = "node .next/standalone/server.js"
